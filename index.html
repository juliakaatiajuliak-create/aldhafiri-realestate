<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الظفيري للعقارات</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
direction:rtl;
}

header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

.hero{
height:500px;
background:url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:50px;
background:rgba(0,0,0,0.6);
padding:20px;
}

.search-box{
background:#1a1a1a;
padding:30px;
text-align:center;
}

.search-box input{
padding:10px;
margin:10px;
width:200px;
border:none;
}

.search-box button{
background:gold;
border:none;
padding:12px 30px;
font-size:16px;
cursor:pointer;
}

.properties{
padding:50px;
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#1c1c1c;
width:300px;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-info{
padding:15px;
}

.price{
color:gold;
font-size:20px;
}

button.details{
background:gold;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

footer{
background:black;
padding:30px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">
الظفيري للعقارات
</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">العقارات</a>
<a href="#">خدماتنا</a>
<a href="#">من نحن</a>
<a href="#">اتصل بنا</a>
</nav>

</header>

<section class="hero">

<h1>
اكتشف أفضل العقارات مع الظفيري
</h1>

</section>

<section class="search-box">

<h2>ابحث عن عقارك</h2>

<input type="text" placeholder="المدينة">

<input type="text" placeholder="نوع العقار">

<input type="text" placeholder="السعر">

<button>
بحث
</button>

</section>

<section class="properties">

<div class="card">

<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994">

<div class="card-info">

<h3>فيلا فاخرة</h3>

<p>بغداد</p>

<p class="price">250,000$</p>

<button class="details">
عرض التفاصيل
</button>

</div>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">

<div class="card-info">

<h3>شقة حديثة</h3>

<p>أربيل</p>

<p class="price">120,000$</p>

<button class="details">
عرض التفاصيل
</button>

</div>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde">

<div class="card-info">

<h3>منزل للبيع</h3>

<p>البصرة</p>

<p class="price">90,000$</p>

<button class="details">
عرض التفاصيل
</button>

</div>

</div>

</section>

<footer>

<p>
© جميع الحقوق محفوظة - الظفيري للعقارات
</p>

</footer>

</body>
</html>
